name: Windows Tunnel

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to checkout (branch, tag, SHA)"
        required: false
        default: "main"
      timeout-minutes:
        description: "Max session duration in minutes (default: 120)"
        required: false
        default: "120"

jobs:
  tunnel:
    runs-on: windows-latest
    timeout-minutes: ${{ fromJSON(inputs.timeout-minutes || '120') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        shell: pwsh
        run: |
          corepack enable
          pnpm install

      - name: Install tmate
        shell: C:\msys64\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}
        run: |
          pacman -S --noconfirm tmate

      - name: Configure SSH access
        shell: C:\msys64\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}
        run: |
          # context(justinvdm, 2026-03-26): Fetch the triggering user's SSH keys
          # from GitHub and write them to authorized_keys so tmate restricts access.
          mkdir -p ~/.ssh
          curl -sL "https://github.com/${{ github.actor }}.keys" > ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          echo "Authorized SSH keys for ${{ github.actor }}:"
          cat ~/.ssh/authorized_keys

      - name: Start tmate and publish SSH address
        shell: C:\msys64\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # context(justinvdm, 2026-03-26): Start tmate in daemon mode, poll its
          # socket for the SSH address, then publish it as a commit status on HEAD.
          # Commit statuses are readable via the GitHub API while the run is still
          # in progress -- unlike artifacts, step logs, or job summaries.

          TMATE_SOCK="/tmp/tmate.sock"

          # Start tmate in daemon mode (creates socket, detaches)
          tmate -S "$TMATE_SOCK" new-session -d

          # Poll for the SSH connection string (tmate needs a few seconds to register)
          SSH_CMD=""
          for i in $(seq 1 30); do
            SSH_CMD=$(tmate -S "$TMATE_SOCK" display -p '#{tmate_ssh}' 2>/dev/null || true)
            if [ -n "$SSH_CMD" ]; then
              break
            fi
            sleep 2
          done

          if [ -z "$SSH_CMD" ]; then
            echo "::error::Failed to get tmate SSH address after 60 seconds"
            exit 1
          fi

          echo "SSH address: $SSH_CMD"

          # Publish as a commit status (readable via API while run is in progress)
          HEAD_SHA=$(git rev-parse HEAD)
          gh api "repos/${{ github.repository }}/statuses/${HEAD_SHA}" \
            -f state=success \
            -f description="${SSH_CMD}" \
            -f context="windows-tunnel" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          echo "Published SSH address as commit status on ${HEAD_SHA}"

      - name: Hold runner alive
        shell: C:\msys64\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}
        run: |
          echo "Tunnel is active. Waiting for session to end or timeout..."
          echo "To end early, SSH in and run: touch /tmp/keepalive-stop"
          while true; do
            if [ -f /tmp/keepalive-stop ]; then
              echo "Stop signal received, shutting down."
              break
            fi
            sleep 30
          done
